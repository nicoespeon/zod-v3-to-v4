# Automates releases from conventional commits using release-please.
# It maintains the CHANGELOG, versioning, and creation of GitHub releases.
# When a Release PR is merged, it also publishes to npm via OIDC trusted publishing.
#
# Docs: https://github.com/marketplace/actions/release-please-action

name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Create a release PR from the Conventional Commits
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use a custom token to trigger CI workflow (GITHUB_TOKEN can't)
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node

      # Once the PR is merged, publish to npm
      - name: Checkout Repository
        uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}
      - name: Setup Node
        uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          cache: pnpm
          node-version: "23"
          registry-url: "https://registry.npmjs.org"
      # Ensure npm 11.5.1 or later for trusted publishing
      - name: Update npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm install -g npm@latest
      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish
