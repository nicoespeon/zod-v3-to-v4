# Ensures PR titles follow the Conventional Commits spec.
# This matters because we squash-merge PRs, so the PR title becomes
# the commit message on main, which release-please uses to determine
# version bumps and changelog entries.
#
# Docs: https://github.com/amannn/action-semantic-pull-request

name: PR title check

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
